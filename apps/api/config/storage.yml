test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Production: S3 with CloudFront CDN
# On ECS: authentication via IAM Role (no keys needed)
# On VPS: authentication via environment variables (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
amazon:
  service: S3
  bucket: <%= ENV.fetch('S3_BUCKET_NAME', 'shuriken-note-storage-production') %>
  region: <%= ENV.fetch('AWS_REGION', 'ap-northeast-1') %>
  access_key_id: <%= ENV['AWS_ACCESS_KEY_ID'] %>
  secret_access_key: <%= ENV['AWS_SECRET_ACCESS_KEY'] %>
  public: true
  upload:
    cache_control: "public, max-age=31536000"
